<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EdreHome Store</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f7f7f7;
  margin: 0;
}

/* HEADER */
header {
  background: #2c2c2c;
  color: white;
  text-align: center;
  padding: 30px 20px;
}

header h1 {
  margin: 0;
  font-size: 32px;
}

header p {
  margin-top: 5px;
  color: #ccc;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* PRODUCT CARD */
.producto {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.producto:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* IMAGE */
.producto img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* TEXT */
.producto h3 {
  margin: 10px 0;
}

.producto p {
  font-size: 18px;
  color: #444;
}

/* BUTTON */
button {
  background: #25D366;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  font-size: 15px;
  transition: 0.3s;
}

button:hover {
  background: #1ebe5d;
}
</style>
</head>

<body>

<header>
  <h1>EdreHome Store</h1>
  <p>Descanso y estilo para tu hogar</p>
</header>

<div class="container">

  <div class="producto">
    <img src="https://via.placeholder.com/300x200">
    <h3>Edredón Queen</h3>
    <p>L.1200</p>
    <button onclick="pedir('Edredón Queen',1200)">Pedir por WhatsApp</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300x200">
    <h3>Almohada Premium</h3>
    <p>L.250</p>
    <button onclick="pedir('Almohada Premium',250)">Pedir por WhatsApp</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300x200">
    <h3>Cortinas Elegantes</h3>
    <p>L.800</p>
    <button onclick="pedir('Cortinas Elegantes',800)">Pedir por WhatsApp</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300x200">
    <h3>Cojines Decorativos</h3>
    <p>L.180</p>
    <button onclick="pedir('Cojines Decorativos',180)">Pedir por WhatsApp</button>
  </div>

</div>

<script>
function pedir(nombre, precio){
  let numero = "50498001122"; // 🔥 PON TU NÚMERO REAL

  let mensaje = "Hola, quiero pedir: " + nombre + " Precio: L." + precio;

  let url = "https://api.whatsapp.com/send?phone=" + numero + "&text=" + encodeURIComponent(mensaje);

  window.open(url, '_blank');
}
</script>

</body>
</html>
