<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdreHome Store</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f7f7f7;
  margin: 0;
}

/* HEADER */
header {
  background: #2c2c2c;
  color: white;
  text-align: center;
  padding: 20px;
}

.logo {
  width: 120px;
  margin-bottom: 10px;
}

/* TITULOS */
h2 {
  margin-left: 30px;
  margin-top: 30px;
  color: #333;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px 30px;
}

/* PRODUCTO */
.producto {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.producto:hover {
  transform: translateY(-5px);
}

/* IMAGEN */
.producto img {
  width: 100%;
  height: auto;
  object-fit: contain;
  background: #fff;
  border-radius: 10px;
}

/* TEXTO */
.producto h3 {
  margin: 10px 0 5px;
}

.producto p {
  font-weight: bold;
}

/* BOTON */
button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  margin-top: 5px;
}

button:hover {
  background: #1ebe5d;
}

/* BOTON FINAL */
.final {
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <img src="LOGO EDRE.png" class="logo">
  <h1>EdreHome Store</h1>
  <p>Descanso y estilo para tu hogar</p>
</header>

<!-- EDREDONES -->
<h2>Edredones</h2>
<div class="container">

  <div class="producto">
    <img src="DENVER.jpg">
    <h3>Edredón Denver</h3>
    <p>L.00</p>
    <button onclick="agregar('Edredón Denver',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="CAPIBARA.jpg">
    <h3>Edredón Capibara</h3>
    <p>L.00</p>
    <button onclick="agregar('Edredón Capibara',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="COOPER.jpg">
    <h3>Edredón Cooper</h3>
    <p>L.00</p>
    <button onclick="agregar('Edredón Cooper',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="GALES.jpg">
    <h3>Edredón Gales</h3>
    <p>L.00</p>
    <button onclick="agregar('Edredón Gales',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="SHADOW.jpg">
    <h3>Edredón Shadow</h3>
    <p>L.00</p>
    <button onclick="agregar('Edredón Shadow',0)">Agregar</button>
  </div>

</div>

<!-- ALMOHADAS -->
<h2>Almohadas</h2>
<div class="container">

  <div class="producto">
    <img src="ALMOHADA VIALIFRESH.jpg">
    <h3>Almohada Vialifresh</h3>
    <p>L.00</p>
    <button onclick="agregar('Almohada Vialifresh',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="ALMOHADAS ABRAZABLES.jpg">
    <h3>Almohadas Abrazables</h3>
    <p>L.00</p>
    <button onclick="agregar('Almohadas Abrazables',0)">Agregar</button>
  </div>

</div>

<!-- CORTINAS -->
<h2>Cortinas</h2>
<div class="container">

  <div class="producto">
    <img src="CORTINAS BLACHOUT.jpg">
    <h3>Cortinas Blackout</h3>
    <p>L.00</p>
    <button onclick="agregar('Cortinas Blackout',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="CORTINAS.jpg">
    <h3>Cortinas</h3>
    <p>L.00</p>
    <button onclick="agregar('Cortinas Blackout',0)">Agregar</button>
  </div>


</div>

<!-- BOTON FINAL -->
<div class="final">
  <button onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
</div>

<script>
let carrito = [];

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  alert(nombre + " agregado");
}

function enviarPedido(){
  if(carrito.length === 0){
    alert("No has agregado productos");
    return;
  }

  let numero = "50498001122";

  let mensaje = "Hola, quiero pedir:\n\n";
  let total = 0;

  carrito.forEach((item, index) => {
    mensaje += (index+1) + ". " + item.nombre + "\n";
    total += item.precio;
  });

  mensaje += "\nTotal: L." + total;

  let url = "https://api.whatsapp.com/send?phone=" + numero + "&text=" + encodeURIComponent(mensaje);

  window.open(url, '_blank');
}
</script>

</body>
</html>
