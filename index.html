<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<title>EdreHome Store</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f7f7f7;
}

/* HEADER */
header {
  background-image: url("fondo-header.jpg");
  background-size: cover;
  background-position: center;
  text-align: center;
  padding: 35px 15px;
  color: white;
  position: relative;
}

header::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  top: 0;
  left: 0;
}

header * {
  position: relative;
  z-index: 1;
}

.logo {
  width: 80px;
}

/* TITULOS */
h2 {
  margin: 20px;
  color: #e91e63;
  border-left: 5px solid #e91e63;
  padding-left: 10px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
  padding: 15px;
}

/* PRODUCTOS */
.producto {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.producto img {
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* BOTONES */
button {
  background: #e91e63;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 5px;
  width: 100%;
}
</style>
</head>

<body>

<header>
  <img src="LOGO EDRE.png" class="logo">
  <h1>EdreHome Store</h1>
  <p>Descanso y estilo para tu hogar</p>
</header>

<h2>Edredones</h2>
<div class="container">
  <div class="producto">
    <img src="DENVER.jpg">
    <h3>Edredón Denver</h3>
    <button>Agregar</button>
  </div>
</div>

<h2>Almohadas</h2>
<div class="container">
  <div class="producto">
    <img src="ALMOHADA VIALIFRESH.jpg">
    <h3>Almohada</h3>
    <button>Agregar</button>
  </div>
</div>

<h2>Cortinas</h2>
<div class="container">
  <div class="producto">
    <img src="CORTINAS.jpg">
    <h3>Cortinas</h3>
    <button>Agregar</button>
  </div>
</div>

</body>
</html>
