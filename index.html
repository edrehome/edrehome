<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdreHome Store</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f7f7f7;
  margin: 0;
}

/* HEADER */
header {
  background: #2c2c2c;
  color: white;
  text-align: center;
  padding: 20px;
}

.logo {
  width: 120px;
}

/* TITULOS */
h2 {
  margin-left: 30px;
  margin-top: 30px;
  color: #333;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* PRODUCTO */
.producto {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
}

.producto img {
  width: 100%;
  height: auto;
  object-fit: contain;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  width: 100%;
}
</style>
</head>

<body>

<header>
  <img src="LOGO EDRE.png" class="logo">
  <h1>EdreHome Store</h1>
</header>

<h2>Edredones</h2>
<div class="container">
  <div class="producto">
    <img src="DENVER.jpg">
    <h3>Edredón Denver</h3>
    <button onclick="agregar('Edredón Denver',0)">Agregar</button>
  </div>

  <div class="producto">
    <img src="CAPIBARA.jpg">
    <h3>Edredón Capibara</h3>
    <button onclick="agregar('Edredón Capibara',0)">Agregar</button>
  </div>
</div>

<h2>Almohadas</h2>
<div class="container">
  <div class="producto">
    <img src="ALMOHADA VIALIFRESH.jpg">
    <h3>Almohada Vialifresh</h3>
    <button onclick="agregar('Almohada Vialifresh',0)">Agregar</button>
  </div>
</div>

<h2>Cortinas</h2>
<div class="container">
  <div class="producto">
    <img src="CORTINAS.jpg">
    <h3>Cortinas</h3>
    <button onclick="agregar('Cortinas',0)">Agregar</button>
  </div>
</div>

<!-- 🔥 BOTON FINAL -->
<div style="padding:20px;">
  <button onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
</div>

<script>
let carrito = [];

function pedir(nombre, precio){
  carrito.push({nombre, precio});
  alert(nombre + " agregado al pedido");
}

function enviarPedido(){
  if(carrito.length === 0){
    alert("No has agregado productos");
    return;
  }

  let numero = "50498001122";

  let mensaje = "Hola, quiero pedir:\n\n";
  let total = 0;

  carrito.forEach((item, index) => {
    mensaje += (index + 1) + ". " + item.nombre + " - L." + item.precio + "\n";
    total += item.precio;
  });

  mensaje += "\nTotal: L." + total;

  let url = "https://api.whatsapp.com/send?phone=" + numero + "&text=" + encodeURIComponent(mensaje);

  window.open(url, '_blank');
}
</script>

</body>
</html>
