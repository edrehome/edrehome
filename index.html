<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdreHome Store</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f7f7f7;
  margin: 0;
}

header {
  background: #2c2c2c;
  color: white;
  text-align: center;
  padding: 20px;
}

.logo {
  width: 120px;
  margin-bottom: 10px;
}

#carritoBarra {
  background: #fff;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

#detalleCarrito {
  background: #f9f9f9;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
  margin-top: 10px;
}

.item-carrito {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.btn-eliminar {
  background: red;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  color: white;
  border: none;
}

h2 {
  margin-left: 30px;
  margin-top: 30px;
  color: #333;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px 30px;
}

.producto {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
  overflow: hidden;
}

.producto:hover {
  transform: translateY(-5px);
}

.producto img {
  width: 100%;
  height: auto;
  object-fit: contain;
  background: #fff;
  border-radius: 10px;
}

.producto h3 {
  margin: 10px 0 5px;
}

.producto p {
  font-weight: bold;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}

button:hover {
  background: #1ebe5d;
}

.btn-final {
  margin: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<header>
  <img src="LOGO EDRE.png" class="logo">
  <h1>EdreHome Store</h1>
  <p>Descanso y estilo para tu hogar</p>
</header>

<div id="carritoBarra">
  🛒 Carrito: <span id="contador">0</span> productos | Total: L.<span id="total">0</span>
  <br>
  <button onclick="toggleCarrito()" style="margin-top:10px; width:auto;">
    Ver carrito
  </button>

  <div id="detalleCarrito" style="display:none;"></div>
</div>

<h2>Edredones</h2>
<div class="container">

  <div class="producto">
    <img src="DENVER.jpg">
    <h3>Edredón Denver</h3>
    <p>L.00</p>
    <button onclick="pedir('Edredón Denver',0)">Pedir</button>
  </div>

  <div class="producto">
    <img src="CAPIBARA.jpg">
    <h3>Edredón Capibara</h3>
    <p>L.00</p>
    <button onclick="pedir('Edredón Capibara',0)">Pedir</button>
  </div>

</div>

<button class="btn-final" onclick="enviarPedido()">
  Enviar pedido por WhatsApp
</button>

<script>
let carrito = [];

function pedir(nombre, precio){
  let productoExistente = carrito.find(item => item.nombre === nombre);

  if(productoExistente){
    productoExistente.cantidad += 1;
  } else {
    carrito.push({ nombre, precio, cantidad: 1 });
  }

  actualizarCarrito();
}

function actualizarCarrito(){
  let totalItems = 0;
  let total = 0;

  carrito.forEach(item => {
    totalItems += item.cantidad;
    total += item.precio * item.cantidad;
  });

  document.getElementById("contador").innerText = totalItems;
  document.getElementById("total").innerText = total;

  renderCarrito();
}

function renderCarrito(){
  let contenedor = document.getElementById("detalleCarrito");

  if(carrito.length === 0){
    contenedor.innerHTML = "<p>Carrito vacío</p>";
    return;
  }

  let html = "";

  carrito.forEach((item, index) => {
    html += `
      <div class="item-carrito">
        ${item.nombre} (x${item.cantidad}) - L.${item.precio * item.cantidad}
        <button class="btn-eliminar" onclick="eliminar(${index})">X</button>
      </div>
    `;
  });

  contenedor.innerHTML = html;
}

function eliminar(index){
  carrito.splice(index, 1);
  actualizarCarrito();
}

function toggleCarrito(){
  let div = document.getElementById("detalleCarrito");
  div.style.display = (div.style.display === "none") ? "block" : "none";
}

function enviarPedido(){
  if(carrito.length === 0){
    alert("No has agregado productos");
    return;
  }

  let numero = "50498001122";

  let mensaje = "Hola, quiero pedir:\n\n";

  carrito.forEach((item, index) => {
    mensaje += (index + 1) + ". " + item.nombre + " x" + item.cantidad + " - L." + (item.precio * item.cantidad) + "\n";
  });

  let total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
  mensaje += "\nTotal: L." + total;

  let url = "https://api.whatsapp.com/send?phone=" + numero + "&text=" + encodeURIComponent(mensaje);

  window.open(url, '_blank');
}
</script>

</body>
</html>
