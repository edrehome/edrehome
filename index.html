<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdreHome Store</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f8;
  margin: 0;
}

/* HEADER */
header {
  background: 
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("FONDO CABECERA.jpg");
  background-size: cover;
  background-position: center;
  padding: 25px;
  text-align: center;
  color: white;
}

.logo { width:100px; border-radius:10px; }

/* TITULOS ROSADOS */
h2 { color:#e91e63; margin:30px; }
.producto h3 { color:#e91e63; }

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.producto {
  background:white;
  padding:15px;
  border-radius:15px;
  text-align:center;
  position:relative;
}

.producto img { width:100%; border-radius:10px; }

.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px;
}

/* PRECIOS */
.precio-original { text-decoration:line-through; color:#999; }
.precio-descuento { color:#28a745; font-weight:bold; }

/* BOTONES */
button {
  background:#25D366;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
}

/* CARRITO */
#carritoBarra {
  background:white;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
}

.btn-sumar { background:#28a745; color:white; }
.btn-restar { background:red; color:white; }
.btn-eliminar { background:red; color:white; }

/* FINAL */
.btn-final { margin:30px; }
</style>
</head>

<body>

<header>
  <img src="LOGO EDRE.png" class="logo">
  <h1>EdreHome Store</h1>
</header>

<div id="carritoBarra">
  🛒 <span id="contador">0</span> | Total: L.<span id="total">0</span>
  <br>
  <button onclick="toggleCarrito()">Ver carrito</button>
  <div id="detalleCarrito" style="display:none;"></div>
</div>

<!-- EDREDONES -->
<h2>Edredones</h2>
<div class="container">
  <div class="producto">
    <span class="badge">OFERTA</span>
    <img src="DENVER.jpg">
    <h3>Edredón Denver</h3>
    <p class="precio-original">1200</p>
    <p class="precio-descuento">899</p>
    <button onclick="pedir('Edredón Denver',899)">Pedir</button>
  </div>

  <div class="producto">
    <img src="CAPIBARA.jpg">
    <h3>Edredón Capibara</h3>
    <p class="precio-descuento">950</p>
    <button onclick="pedir('Edredón Capibara',950)">Pedir</button>
  </div>
</div>

<!-- ALMOHADAS -->
<h2>Almohadas</h2>
<div class="container">
  <div class="producto">
    <img src="ALMOHADA VIALIFRESH.jpg">
    <h3>Almohada Vialifresh</h3>
    <p class="precio-descuento">300</p>
    <button onclick="pedir('Almohada Vialifresh',300)">Pedir</button>
  </div>
</div>

<button class="btn-final" onclick="enviarPedido()">Enviar pedido</button>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function pedir(nombre, precio){
  let item = carrito.find(p => p.nombre === nombre);
  item ? item.cantidad++ : carrito.push({nombre,precio,cantidad:1});
  actualizar();
}

function actualizar(){
  let total=0,cantidad=0;
  carrito.forEach(p=>{
    total+=p.precio*p.cantidad;
    cantidad+=p.cantidad;
  });

  document.getElementById("contador").innerText=cantidad;
  document.getElementById("total").innerText=total;

  guardar();
  render();
}

function render(){
  let div=document.getElementById("detalleCarrito");

  if(carrito.length===0){
    div.innerHTML="Vacío";
    return;
  }

  div.innerHTML=carrito.map((p,i)=>`
    <div>
      ${p.nombre} x${p.cantidad}
      <button class="btn-sumar" onclick="sumar(${i})">+</button>
      <button class="btn-restar" onclick="restar(${i})">-</button>
      <button class="btn-eliminar" onclick="eliminar(${i})">X</button>
    </div>
  `).join("");
}

function sumar(i){
  carrito[i].cantidad++;
  actualizar();
}

function restar(i){
  carrito[i].cantidad--;
  if(carrito[i].cantidad<=0) carrito.splice(i,1);
  actualizar();
}

function eliminar(i){
  carrito.splice(i,1);
  actualizar();
}

function toggleCarrito(){
  let d=document.getElementById("detalleCarrito");
  d.style.display=d.style.display==="none"?"block":"none";
}

/* WHATSAPP COMPLETO */
function enviarPedido(){
  if(carrito.length===0){
    alert("No hay productos");
    return;
  }

  let nombre=prompt("Ingresa tu nombre:");
  if(!nombre) return;

  let msg="Hola, quiero pedir:\n\n";
  msg+="Cliente: "+nombre+"\n\n";

  let total=0;

  carrito.forEach(p=>{
    let sub=p.precio*p.cantidad;
    total+=sub;
    msg+=p.nombre+" x"+p.cantidad+" - L."+sub+"\n";
  });

  msg+="\nTotal: L."+total;

  window.open("https://api.whatsapp.com/send?phone=50498001122&text="+encodeURIComponent(msg));

  carrito=[];
  localStorage.removeItem("carrito");
  actualizar();
}

actualizar();
</script>

</body>
</html>
