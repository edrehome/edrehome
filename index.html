<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdreHome Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f7f7f7;
}

/* NAVBAR */
.navbar {
  background: #e91e63;
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-links a {
  color: white;
  margin-right: 15px;
  text-decoration: none;
}

/* CONTADOR */
.cart-count {
  background: white;
  color: #e91e63;
  padding: 3px 8px;
  border-radius: 50px;
  font-size: 12px;
}

/* HEADER */
header {
  background-image: url("fondo-header.jpg");
  background-size: cover;
  background-position: center;
  color: white;
  text-align: center;
  padding: 30px;
  position: relative;
}

header::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

header * {
  position: relative;
}

/* TITULOS */
h2 {
  margin: 20px;
  color: #e91e63;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
  padding: 15px;
}

/* PRODUCTO */
.producto {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.producto img {
  width: 100%;
}

/* BOTON */
button {
  background: #e91e63;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 5px;
  width: 100%;
}

/* 🔥 CARRITO */
.carrito {
  position: fixed;
  right: 0;
  top: 60px;
  width: 250px;
  background: white;
  height: 100%;
  box-shadow: -2px 0 10px rgba(0,0,0,0.1);
  padding: 10px;
  overflow-y: auto;
}

.carrito h3 {
  margin-top: 0;
}

.carrito ul {
  padding-left: 15px;
}

.carrito button {
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-links">
    <a href="#edredones">Edredones</a>
    <a href="#almohadas">Almohadas</a>
    <a href="#cortinas">Cortinas</a>
  </div>
  <div>
    🛒 <span class="cart-count" id="contador">0</span>
  </div>
</div>

<header>
  <h1>EdreHome Store</h1>
</header>

<h2 id="edredones">Edredones</h2>
<div class="container">
  <div class="producto">
    <img src="DENVER.jpg">
    <h3>Edredón Denver</h3>
    <button onclick="agregar('Edredón Denver')">Agregar</button>
  </div>
</div>

<h2 id="almohadas">Almohadas</h2>
<div class="container">
  <div class="producto">
    <img src="ALMOHADA VIALIFRESH.jpg">
    <button onclick="agregar('Almohada')">Agregar</button>
  </div>
</div>

<h2 id="cortinas">Cortinas</h2>
<div class="container">
  <div class="producto">
    <img src="CORTINAS.jpg">
    <button onclick="agregar('Cortinas')">Agregar</button>
  </div>
</div>

<!-- 🔥 PANEL CARRITO -->
<div class="carrito">
  <h3>Tu pedido</h3>
  <ul id="lista"></ul>
  <button onclick="enviarPedido()">Enviar WhatsApp</button>
  <button onclick="vaciar()">Vaciar</button>
</div>

<script>
let carrito = [];

function agregar(nombre){
  carrito.push(nombre);
  actualizar();
}

function actualizar(){
  let lista = document.getElementById("lista");
  let contador = document.getElementById("contador");

  lista.innerHTML = "";
  carrito.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item;
    lista.appendChild(li);
  });

  contador.textContent = carrito.length;
}

function vaciar(){
  carrito = [];
  actualizar();
}

function enviarPedido(){
  let mensaje = "Hola, quiero pedir:\n\n";
  carrito.forEach((item,i)=>{
    mensaje += (i+1)+". "+item+"\n";
  });

  let url = "https://api.whatsapp.com/send?phone=50498001122&text="+encodeURIComponent(mensaje);
  window.open(url);
}
</script>

</body>
</html>
